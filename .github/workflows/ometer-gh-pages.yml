name: Ollama Benchmark → GitHub Pages

# ---------------------------------------------------------
# 1️⃣ Trigger – hourly + manual
on:
  # schedule disabled for debugging; use push triggers
  push:
  workflow_dispatch:            # allow on‑demand runs

# ---------------------------------------------------------
# 2️⃣ Concurrency – avoid overlapping runs
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

# ---------------------------------------------------------
# 3️⃣ Permissions – minimal
permissions:
  contents: write      # needed to push to gh‑pages branch
  pages: write        # push to gh‑pages (via the gh‑pages action)
  id-token: write     # needed by the gh‑pages action for authentication

jobs:
  benchmark-and-deploy:
    runs-on: ubuntu-latest

    # -------------------------------------------------
    # 4️⃣ Export the secret as an environment variable that the
    #    ometer Config class expects (OLLAMA_CLOUD_API_KEY).
    env:
      OLLAMA_CLOUD_API_KEY: ${{ secrets.UPLLAMA_KEY }}

    steps:
      # ---- 4️⃣ Checkout the repository ----------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed to push to gh‑pages later

      # ---- 5️⃣ Set up Python -------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ---- 6️⃣ Install package + Jinja2 ---------------
      - name: Install ometer and rendering deps
        run: |
          python -m pip install --upgrade pip
          pip install jinja2               # only need Jinja2 for rendering

      # ---- 7️⃣ Run the benchmark (produces results.json) ----------
      - name: Generate dummy benchmark results (CI cannot reach Ollama)
        run: |
          python scripts/generate_dummy_results.py

      # ---- 8️⃣ Render static site from JSON --------------------
      - name: Render HTML site from JSON
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python scripts/render_results.py

      # ---- 9️⃣ (Optional) Keep raw JSON as an artifact for debugging
      - name: Upload raw JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: results.json
          retention-days: 7

      # ---- 10️⃣ Deploy to GitHub Pages ---------------
      - name: Deploy site to gh‑pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages
          commit_message: "🤖 Update benchmark – run ${{ github.run_number }}"
          force_orphan: false
          keep_files: false
